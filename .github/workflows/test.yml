name: Tests

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          # Provide empty stubs so config.py doesn't crash on import
          SLACK_BOT_TOKEN: "xoxb-test"
          SLACK_APP_TOKEN: "xapp-test"
          ANTHROPIC_API_KEY: "test"
          APOLLO_API_KEY: "test"
          EXA_API_KEY: "test"
          ENVIRONMENT: "test"
          LOG_LEVEL: "error"
